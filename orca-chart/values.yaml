# Default values for helm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Workload kind. One of "Deployment" or "StatefulSet". Persistent storage
# (`orca.varnish.storage.stores`) requires StatefulSet, which also provides
# stable per-pod DNS via a headless companion service.
kind: Deployment

# Defaults applied to every PVC the chart creates for `orca.varnish.storage.stores`.
# A PVC is created for each store, sized to `store.size` and mounted at
# `store.path`. Leave `orca.varnish.storage.stores` empty to use a memory-only
# cache.
storage:
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  labels: {}
  annotations: {}

image:
  repository: docker.io/varnish/orca
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  http:
    enabled: true
    port: 80
  https:
    enabled: false
    port: 443

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: varnish-orca.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http

# Autoscaling is supported but generally a poor fit for caches: scale-up adds
# cold replicas, and scale-down throws warm cache away. Manual scaling via
# `replicaCount` is usually preferable.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Sets the extra environment variables for Varnish Orca. Can be set as either
# an object, a list, or a templated string.
extraEnvs: {}
#extraEnvs:
#  MY_ENV_VAR: value
#  MY_OTHER_ENV_VAR: other_value
#
#extraEnvs:
#  - name: MY_ENV_VAR
#    value: value
#  - name: MY_OTHER_ENV_VAR
#    valueFrom:
#      configMapRef:
#        name: my-config-map
#        value: my-key
#

nodeSelector: {}

tolerations: []

affinity: {}

orca:
  acme: {}
  git_mirror: {}
  license:
    secret: ""
  otel: {}
  supervisor: {}
  varnish:
    http:
    - port: 80
    # Storage backends for Varnish Enterprise. Each entry gets a PVC sized to
    # `size` and mounted at `path` (orca treats the path as a directory and
    # creates the MSE4 book/store files inside it). PVC defaults come from
    # the top-level `storage:` block.
    #
    # `size` must be strictly greater than `book_size` + 1G filesystem overhead.
    # `book_size` defaults to 5G, so `size` must be greater than 6G unless
    # `book_size` is overridden.
    storage:
      stores: []
      # - name: store1
      #   path: /var/lib/varnish-supervisor/storage/store1
      #   size: 100G
  virtual_registry:
    registries:
    - name: dockerhub
      default: true
      remotes:
      - url: https://docker.io
    - name: quay
      remotes:
      - url: https://quay.io
    - name: ghcr
      remotes:
      - url: https://ghcr.io
    - name: k8s
      remotes:
      - url: https://registry.k8s.io
    - name: npmjs
      remotes:
      - url: https://registry.npmjs.org
    - name: go
      remotes:
      - url: https://proxy.golang.org
    - name: github
      remotes:
      - url: https://github.com
    - name: gitlab
      remotes:
      - url: https://gitlab.com
