---

# Overrides the name of the chart (without the release name). For example, setting
# `nameOverride` to "hello" would produce a workload named "release-name-hello".
# Containers within a pod derive their name from this setting. By default, the name
# of the chart is used (i.e., "varnish-enterprise").
nameOverride: ""

# Overrides the full name of the chart (with the release name). This setting allows
# overriding both release name and a workload name altogether. For example, setting
# `fullnameOverride` to "hello" would produce a workload named "hello". By default,
# a composition of a Helm release name and the name of the chart is used
# (i.e., "release-name-varnish-enterprise").
fullnameOverride: ""

global:
  # An array of object that conforms to the Kubernetes imagePullSecrets definition.
  # When set, each item in an array must consist of an object with a key `name`
  # referencing the Kubernetes secret.
  # Type: array of objects
  # Example:
  #   imagePullSecrets:
  #     - name: registry-quay-k7c2f4m2d5
  imagePullSecrets: []

  # Overrides the default busybox initContainer image.
  initContainer:
    # The image to use for the initContainer.
    image: "busybox"

    # The tag to use for the initContainer image.
    tag: "1.36"
  # An object that conforms to the Kubernetes securityContext definition of a Pod.
  # This securityContext will be set on all Pods within this chart. For setting
  # securityContext on all containers, see `global.securityContext`.
  podSecurityContext:
    # The fsGroup to use for the pod security context.
    fsGroup: 999

  # An object that conforms to the Kubernetes securityContext definition of a Container.
  # This securityContext will be set on all containers within this chart. For setting
  # securityContext on the Pod itself, see `global.podSecurityContext`.
  securityContext:
    # The user ID to run the container as.
    runAsUser: 999
    # Whether to run the container as a non-root user.
    # Type: boolean
    runAsNonRoot: true

  # Applies extra annotations to all workloads. The value can be set as either an object
  # or a template string. Workload annotations can be used for applying additional metadata
  # or for integrating with external tooling. The annotations specified here will be applied
  # to the workload itself.
  #
  # To apply annotations on a Pod, use `global.podAnnotations`. To apply annotations on a
  # specific workload, use `server.annotations`.
  #
  # Type: object or template string
  # Availability: v1.5.0
  annotations: {}

  # Applies extra annotations to all Pods. The value can be set as either an object or a
  # template string. Pod annotations can be used for applying additional metadata or for
  # integrating with external tooling. Annotations specified here will be applied to a Pod
  # itself.
  #
  # To apply labels on a workload, use `global.annotations`. To apply labels on a specific
  # Pod, use `server.podAnnotations`.
  # Type: object or template string
  # Availability: v1.5.0
  podAnnotations: {}

  # Applies extra labels to all workloads. The value can be set as either an object or a
  # template string. Workload labels can be used for applying additional metadata or for
  # integrating with external tooling. The labels specified here will be applied to the
  # workload itself.
  # To apply labels on a Pod, use `global.podLabels`. To apply labels on a specific workload,
  # use `server.labels`.
  # Type: object or template string
  # Availability: v1.5.0
  labels: {}

  # Applies extra labels to all Pods. The value can be set as either an object or a template
  # string. Pod labels can be used for applying additional metadata or for integrating with
  # external tooling. Labels specified here will be applied to a Pod itself.
  # To apply labels on a workload, use `global.labels`. To apply labels on a specific Pod,
  # use `server.podLabels`.
  # Type: object or template string
  # Availability: v1.5.0
  podLabels: {}

  # An object that conforms to the Kubernetes resources definition of a Container.
  # This configuration will resource constraint to all containers. To specify
  # resources on a single container, use `server.resources`, `server.agent.resources`,
  # and `server.varnishncsa.resources`.
  # Availability: v1.5.0
  # Example:
  #   resources:
  #     limits:
  #       cpu: 100m
  #       memory: 128Mi
  #     requests:
  #       cpu: 100m
  #       memory: 128Mi
  resources: {}

  # An object configuring Varnish Controller Agent access to NATS.
  natsServer:
    # An FQDN to the NATS server. The value is ignored if `global.natsServer.internal.enabled` is set to
    # true. Required when `server.agent.enabled` is set to true and
    # `global.natsServer.internal.enabled` is set to false.
    externalAddress: ""

    internal:
      # Configures Varnish Agent to use the internal NATS server.
      # Type: boolean
      enabled: true

      # Discovers the internal NATS server within the given namespace. By default, the current namespace
      # is used.
      namespace: ""

      # Overrides the full name of the internal NATS server. Required if `nameOverride` or
      # `fullnameOverride` is used in the Varnish Controller Helm Chart. By default, "varnish-controller"
      # is used.
      releaseName: ""

      # Sets internal NATS password from an external secret. Internal NATS must be configured
      # separately. See
      # [Varnish Controller Helm Chart documentation](https://docs.varnish-software.com/varnish-helm/varnish-controller/configurations/)
      # for more information.
      #
      # Note: if internal Varnish Controller is deployed on another namespace than the one Varnish
      # Enterprise is deployed to, the `varnish-controller-credentials` secret needs to be manually
      # copied from the Varnish Controller namespace.
      # Availability: v1.3.0
      passwordFrom:
        name: varnish-controller-credentials
        key: nats-varnish-password

      # Overrides the Kubernetes cluster domain. Required if Kubernetes cluster is configured to use
      # different cluster domain than the default. By default, "cluster.local" is used. In most cases,
      # this value should not be changed.
      clusterDomain: "cluster.local"

serviceAccount:
  # Create a Kubernetes service account to use with a workload.
  # Type: boolean
  create: true

  # Applies extra labels to the service account. The value can be set as either an object or a template string.
  # Type: object or template string
  labels: {}

  # Applies extra annotations to the service account. The value can be set as either an object or a template string.
  # Type: object or template string
  annotations: {}

  # Overrides the name of the service account. By default, the full name of the chart is used.
  name: ""

# Configures Varnish Enterprise server.
server:
  # Specifies the number of replicas to deploy Varnish Enterprise server. The value is ignored if
  # `server.kind` is "DaemonSet".
  #
  # Before v1.6.0, when `server.autoscaling.enabled` is set to `true`, this value will be ignored and
  # `server.autoscaling.minReplicas` must be used instead.
  #
  # From v1.6.0, when `server.autoscaling.enabled` is set to `true`, and `server.autoscaling.minReplicas` is `-`,
  # the value of `server.replicas` will be used. `server.replicas` is ignored if
  # `server.autoscaling.minReplicas` is set to a number.
  replicas: 1

  # Specifies the type of workload to deploy Varnish Enterprise server. The value can be one of
  # `Deployment`, `DaemonSet`, or `StatefulSet` depending on usage scenarios (see examples).
  kind: "Deployment"

  # Applies extra labels to a workload. The value can be set as either an object or a template string.
  # Labels specified here will be applied to the workload itself. To apply labels on the Pod, use
  # `server.podLabels`.
  # Type: object or template string
  labels: {}

  # Applies extra annotations to a workload. The value can be set as either an object or a template string.
  # workload annotations can be used to for applying additional metadata or for integrating with external
  # tooling. The annotations specified here will be applied to the workload itself. To apply labels on the
  # Pod, use `server.podAnnotations`.
  # Type: object or template string
  annotations: {}

  # Configures [deployment strategy](https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy)
  # to replace existing Pod with a new one. This configuration is only available when `server.kind` is set to
  # Deployment. For StatefulSet and DaemonSet, see `server.updateStrategy`.
  # Availability: v1.1.0
  # Type: object or template string
  strategy: {}

  # Configures update strategy for updating Pods when a change is made to the manifest. This configuration
  # is only available when `server.kind` is set to StatefulSet or DaemonSet. For Deployment, see
  # `server.strategy`.
  #
  # *Note: While both StatefulSet and DaemonSet share the same `updateStrategy` configuration key, its
  # applicable values are different. See
  # [updateStrategy on StatefulSet](https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies)
  # and [updateStrategy on DaemonSet](https://kubernetes.io/docs/tasks/manage-daemon/update-daemon-set/).*
  # Availability: v1.1.0
  # Type: object or template string
  updateStrategy: {}

  # Whether to enables hostNetwork for Varnish Enterprise pod. This will make the Varnish Enterprise pod
  # bind to the port of the host instead of using a container network provided by Kubernetes.
  #
  # Setting this will also set `ClusterFirstWithHostNet` to allow the Pod to communicate with Kubernetes
  # DNS.
  # Type: boolean
  hostNetwork: false

  # Whether to enable shared PID namespace between all containers in a Pod. This is useful for
  # a scenario where it is necessary to send a signal to a process across a container.
  # Availability: v1.2.1
  # Type: boolean
  shareProcessNamespace: false

  # The working directory of Varnish inside /var/lib/varnish.
  workDir: "varnish"

  http:
    # Configures Varnish to listen for HTTP traffic.
    # Type: boolean
    enabled: true
    # Configures the TCP port on which Varnish will listen for HTTP traffic. This port is used for Varnish
    # to bind to within a container. To change the port exposed via service to other applications, see
    # `server.service.http.port`.
    port: 6081
    # Configures the address to listen to for HTTP.
    # Availability: v1.7.4
    address: "0.0.0.0"
    # Set this to `true` to listen to podIP instead of a specific address. Note that setting this might make
    # port forwarding with kubectl more challenging.
    # Availability: v1.7.4
    # Type: boolean
    podIP: false

  tls:
    # Configures Varnish to enable [In-Process TLS](https://docs.varnish-software.com/varnish-enterprise/features/core-ssl/)
    # and listens to HTTPS traffic. When enabled,
    # `server.tls.config` must also be configured. Certificates may be mounted into the Pod using
    # `server.extraVolumeMounts` and `server.extraVolumes`.
    #
    # This port is used by HTTP service as a targetPort.
    # Type: boolean
    enabled: false

    # Configures the TCP port on which Varnish will listen for HTTPS traffic. This port is used for Varnish
    # to bind to within a container. To change the port exposed via service to other applications, see
    # `server.service.https.port`.
    #
    # This port is used by HTTPS service as a targetPort.
    port: 6443

    # Configures the address on which Varnish will listen for HTTPS traffic.
    # Type: template string
    address: "0.0.0.0"

    # The TLS configuration. See also [In-Process TLS](https://docs.varnish-software.com/varnish-enterprise/features/core-ssl/) for configuration options. It is recommended
    # to reference to a port in a configuration using `{{ .Values.server.tls.port }}` template string for
    # services integration.
    # Type: template string
    # Example:
    # config: |
    #   frontend = {
    #     host = ""
    #     port = "{{ .Values.server.tls.port }}"
    #   }
    #
    #   pem-file = "/etc/varnish/certs/example.pem"
    config: ""

    # Use the content of the given file path as TLS configuration. The file will be
    # parsed as templated string. Will override "server.tls.config" if set. Note that
    # the file must be placed inside the files/ directory in the Helm chart
    # itself.
    # Example:
    #     configFile: "files/tls.cfg"
    configFile: ""

  admin:
    # Configures the address for Varnish management interface.
    address: "127.0.0.1"

    # Configures the port for Varnish management interface.
    port: 6082

  # An array of extra ports for Varnish to listen to.
  # Type: array of objects
  # Example:
  #   extraListens:
  #     - name: proxy
  #       address: "127.0.0.1"
  #       port: 8088
  #       proto: "PROXY"
  #     - name: proxy-sock
  #       path: "/tmp/varnish-proxy.sock"
  #       user: "www"
  #       group: "www"
  #       mode: "0700"
  #       proto: "PROXY"
  extraListens: []

  # Sets an additional environment variable for Varnish Enterprise container.
  #
  # Can be set as an array of objects, an object, or a template string.
  # Availability: v1.5.0
  # Type: object or array or template string
  # Example:
  # extraEnvs:
  #   MY_ENV_VAR: value
  #   MY_OTHER_ENV_VAR: other_value
  #
  # Example:
  #   extraEnvs:
  #     - name: MY_ENV_VAR
  #       value: value
  #     - name: MY_OTHER_ENV_VAR
  #       valueFrom:
  #         configMapRef:
  #           name: my-config-map
  #           key: my-key
  #
  extraEnvs: {}

  # Sets the default Time To Live (in seconds) for a cached object.
  ttl: 120

  # Sets the minimum number of worker threads in each pool. See also [varnishd documentation](https://varnish-cache.org/docs/6.0/reference/varnishd.html).
  minThreads: 50

  # Sets the maximum number of worker threads in each pool. See also [varnishd documentation](https://varnish-cache.org/docs/6.0/reference/varnishd.html).
  maxThreads: 1000

  # Sets the threshold in seconds where idle threads are destroyed after least this duration.
  threadTimeout: 120

  # Sets the command for Varnish Enterprise
  # Note that by overriding this, you will also override parameters, listening ports, etc.
  # Type: array of strings
  # See: https://varnish-cache.org/docs/6.0/reference/varnishd.html
  command: []

  # Sets the extra configuration args for Varnish Enterprise.
  extraArgs: []

  # Sets the Varnish Enterprise parameters (i.e. the -p argument).
  #
  # Varnish Enterprise parameters defined here will be translated from camelCase into
  # a snake_case. For example, a parameter named "backendIdleTimeout" will be transformed
  # into "backend_idle_timeout". If an array is given, it will be joined with a comma.
  # Example:
  #   parameters:
  #     backendIdleTimeout: "60"
  #     feature:
  #       - "+http2"
  #       - "+validate_headers"
  parameters: {}

  # An array of objects that conform to the Kubernetes [initContainers](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#PodSpec) definition of a Pod.
  # This can be used to run initialization tasks before varnishd starts. Note that `initContainers`
  # cannot be changed once it is applied. To update this value after the initial deploy, uninstall
  # Varnish Enterprise Helm Chart from the cluster and reinstall. The value can be set as either an array
  # of objects or a template string.
  # Type: array or template string
  #  extraInitContainers: |
  #    - name: varnish-setup-tls
  #      securityContext:
  #        {{- toYaml .Values.global.securityContext | nindent 4 }}
  #      image: debian:latest
  #      command:
  #        - sh -c "sleep 3600"
  extraInitContainers: []

  # An array of objects that conforms to the Kubernetes [containers](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#PodSpec) definition of a Pod.
  # This can be used to add a sidecar container to varnishd. The value can be set as either an array of objects
  # or a template string.
  # Type: array or template string
  # Example:
  #   extraContainers: |
  #     - name: varnish-hello
  #       securityContext:
  #         {{- toYaml .Values.global.securityContext | nindent 4 }}
  #       image: hello-world:latest
  #       volumeMounts:
  #         - name: {{ .Release.Name }}-varnish-vsm
  #           mountPath: /var/lib/varnish
  extraContainers: []

  # An array of objects that conforms to the Kubernetes [VolumeClaimTemplates](https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#volume-claim-templates)
  # definition of a StatefulSet workload. This configuration is only available when `server.kind` is
  # set to StatefulSet.
  # Availability: v1.3.0
  # Type: array or template string
  # Example:
  #   extraVolumeClaimTemplates: |
  #     - metadata:
  #       name: {{ .Release.Name }}-pv
  #       spec:
  #         accessModes: ["ReadWriteOnce"]
  #         resources:
  #           requests:
  #             storage: "10G"
  extraVolumeClaimTemplates: []

  # An array of objects that conforms to the Kubernetes [volumeMounts](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers)
  # definition of a Container. This configuration is used to mount extra volumes defined in
  # `server.extraVolumes` into the Varnish Enterprise container. The value can be set as either
  # an array of objects or a template string.
  # Type: array or template string
  # Example:
  #   extraVolumeMounts: |
  #     - name: {{ .Release.Name }}-local-mse
  #       mountPath: /var/lib/mse
  extraVolumeMounts: []

  # An array of objects that conforms to the Kubernetes [volumes](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#PodSpec) definition of a Pod.
  # This configuration is used to define volumes to be used in `server.extraVolumeMounts`, or
  # within `server.extraContainers`, or within `server.extraInitContainers`. The value can be set as
  # either an array of objects or a template string.
  # Type: array or template string
  # Example:
  #   extraVolumes: |
  #     - name: {{ .Release.Name }}-local-mse
  #       hostPath:
  #         path: /data/mse
  #         type: Directory
  extraVolumes: []

  mse:
    # Enables Massive Storage Engine. Only one of `server.mse.enabled` or `server.mse4.enabled` must be enabled.
    #
    # When set to a string "-", `server.mse.enabled` will be set to an opposite value of `server.mse4.enabled` (i.e. automatically disabling MSE when MSE4 is enabled, and vice versa)
    # Availability: v1.6.1
    # Type: boolean or string
    enabled: "-"

    # Sets the amount of memory to use for MSE. The value can be set as either a percentage (e.g., "80%"),
    # or bytes ("512m"). If cgroups resource limits are used (i.e., `server.resources`), the percentage is
    # calculated from the resource limit that is assigned to the container.
    memoryTarget: ""

    # An MSE configuration. By default, the value is unset and MSE is run in a
    # [memory-only mode](https://docs.varnish-software.com/varnish-enterprise/features/mse_4/#getting-started-with-ephemeral-caching).
    # See also the examples in [MSE Quick Start](https://docs.varnish-software.com/varnish-enterprise/features/mse_4/#getting-started-with-persisted-caching-in-mse4)
    # for more information on how to configure MSE.
    #
    # If `server.mse.persistence.enabled` is true, it is recommended to reference to MSE path using
    # `{{ .Values.server.mse.persistence.mountPath }}` template string in the configuration.
    # Type: template string
    # Example:
    #     config: |
    #       env: {
    #         id = "env";
    #         memcache_size = "auto";
    #         books = ( {
    #           id = "book1";
    #           directory = "{{ .Values.server.mse.persistence.mountPath }}/book1";
    #           database_size = "1G";
    #           stores = ( {
    #             id = "store";
    #             filename = "{{ .Values.server.mse.persistence.mountPath }}/store1.dat";
    #             size = "9G";
    #           } );
    #         } );
    #       };
    config: ""

    # Use the content of the given file path as MSE configuration. The file will be
    # parsed as templated string. Will override "server.mse.config" if set. Note that
    # the file must be placed inside the files/ directory in the Helm chart
    # itself.
    # Example:
    #     configFile: "files/mse.cfg"
    configFile: ""

    persistence:
      # Enables MSE persistence mode using [PersistentVolumes](https://kubernetes.io/docs/concepts/storage/persistent-volumes/).
      # This configuration is only available when `server.kind` is set to StatefulSet. See the
      # [using StatefulSet](https://docs.varnish-software.com/varnish-helm/varnish-enterprise/deployments/statefulset/)
      # documentation for more information.
      # Type: boolean
      enabled: false

      # Database size relative to storageSize, for auto-configuring MSE based on
      # server.mse.persistence.storageSize.
      #
      # Can be set as a percentage or a value.
      #
      # Both server.mse.persistence.bookSize and server.mse.persistence.storeSize
      # must add to up 100% or server.mse.persistence.storageSize. Only applicable
      # if server.mse.config is empty.
      bookSize: "1%"

      # Sets the store size for MSE store. Can be set as a percentage (e.g. `1%`) or a literal size (e.g. `10Gi`).
      # When the value is set as a percentage, the value will be relative to `server.mse.persistence.storageSize`.
      # Availability: v1.3.0
      storeSize: "91%"

      # Sets the mount path inside the container for
      # [PersistentVolume](https://kubernetes.io/docs/concepts/storage/persistent-volumes/).
      mountPath: "/var/lib/mse"

      # Type: object or template string
      # Sets the extra labels for Persistence Volume Claim for MSE.
      # Can be set as a templated string.
      labels: {}

      # Type: object or template string
      # Sets the extra annotations for Persistence Volume Claim for MSE.
      # Can be set as a templated string.
      annotations: {}

      # Type: array of strings
      # Sets the storage access modes for Persistence Volume Claim for MSE.
      accessModes: ["ReadWriteOnce"]

      # Sets the storage class for Persistence Volume Claim for MSE.
      storageClassName: ""

      # Sets the storage size for Persistence Volume Claim for MSE.
      storageSize: "10Gi"

  mse4:
    # Enables Massive Storage Engine 4. Only one of `server.mse.enabled` or `server.mse4.enabled` must be enabled.
    # Availability: v1.6.1
    # Type: boolean
    enabled: false

    # Sets the amount of memory to use for MSE4. The value can be set as either a percentage (e.g., "80%"),
    # or bytes ("512m"). If cgroups resource limits are used (i.e., `server.resources`), the percentage is
    # calculated from the resource limit that is assigned to the container.
    # Availability: v1.6.1
    memoryTarget: ""

    # An MSE configuration. By default, the value is unset and MSE4 is run in a memory-only mode.
    #
    # If `server.mse4.persistence.enabled` is true, it is recommended to reference to MSE path using
    # `{{ .Values.server.mse4.persistence.mountPath }}` template string in the configuration.
    # Availability: v1.6.1
    # Type: template string
    config: ""

    # Use the content of the given file path as MSE4 configuration. The file will be
    # parsed as templated string. Will override "server.mse4.config" if set. Note that
    # the file must be placed inside the files/ directory in the Helm chart
    # itself.
    # Example:
    #     configFile: "files/mse4.cfg"
    configFile: ""

    persistence:
      # Enables MSE4 persistency; only applicable if kind is "StatefulSet".
      # Note that the backing storage must be "ext4".
      enabled: false

      # Database size relative to storageSize, for auto-configuring MSE based on
      # server.mse.persistence.storageSize.
      #
      # Can be set as a percentage or a value.
      #
      # Both server.mse.persistence.bookSize and server.mse.persistence.storeSize
      # must add to up 100% or server.mse.persistence.storageSize. Only applicable
      # if server.mse.config is empty.
      bookSize: "1%"

      # Store size relative to storageSize, for auto-configuring MSE4 based on
      # server.mse.persistence.storageSize.
      #
      # Can be set as a percentage or a value.
      #
      # Both server.mse4.persistence.bookSize and server.mse4.persistence.storeSize
      # must add to up 100% or server.mse4.persistence.storageSize. Only applicable
      # if server.mse4.config is empty.
      storeSize: "91%"

      # Sets the mount path for Persistence Volume Claim for MSE4.
      mountPath: "/var/lib/mse4"

      # Sets the extra labels for Persistence Volume Claim for MSE4.
      # Can be set as a templated string.
      # Type: object or template string
      labels: {}

      # Sets the extra annotations for Persistence Volume Claim for MSE4.
      # Can be set as a templated string.
      # Type: object or template string
      annotations: {}

      # Sets the storage access modes for Persistence Volume Claim for MSE4.
      # Type: array of strings
      accessModes: ["ReadWriteOnce"]

      # Sets the storage class for Persistence Volume Claim for MSE4.
      storageClassName: ""

      # Sets the storage size for Persistence Volume Claim for MSE4.
      storageSize: "10Gi"

  # Sets the Varnish secret for accessing the varnishd admin interface. Either this value or
  # `server.secretFrom` can be set.
  secret: ""

  # Sets the Varnish secret from an external Kubernetes secret for accessing the varnishd admin
  # interface. Either this value or `server.secret` can be set.
  # Availability: v1.3.0
  # Example:
  #     secretFrom:
  #       name: secret-name
  #       key: varnish-secret
  secretFrom: {}

  # Use the content of the given file path as Varnish secret. The file will be
  # parsed as templated string. Will override "server.secret" if set. Note that
  # the file must be placed inside the files/ directory in the Helm chart itself.
  # Example:
  #   secretFile: "files/secret"
  secretFile: ""

  # A path to the main VCL configuration. This configuration affects the location where
  # `server.vclConfig` will be saved to, as well as the `VARNISH_VCL_CONF` environment variable in the
  # Varnish Enterprise container.
  # Availability: v1.2.0
  vclConfigPath: "/etc/varnish/default.vcl"

  # A VCL configuration for Varnish Enterprise.
  #
  # Before v1.6.0, required if Varnish Controller Agent is not used.
  # Type: template string
  vclConfig: ""

  # Use the content of the given file path as VCL configuration. The file will be
  # parsed as templated string. Will override "server.vclConfig" if set. Note that
  # the file must be placed inside the files/ directory in the Helm chart
  # itself.
  # Example:
  #   vclConfigFile: "files/default.vcl"
  vclConfigFile: ""

  # Extra VCL configuration where a filename as a key and template string as a value. The path to store
  # `server.vclConfigs` will be relative to that of `server.vclConfigPath`.
  #
  # If the filename in `server.vclConfigs` matches the name in `server.vclConfigPath`, it will be treated
  # in the same way as `server.vclConfig`. In this case, `server.vclConfig` must not be set.
  # Availability: v1.2.0
  # Type: object or template string
  # Example:
  #   vclConfigs:
  #     main.vcl: |
  #       vcl 4.1;
  #
  #       backend default {
  #         .host = "127.0.0.1";
  #         .port = "8080";
  #       }
  vclConfigs: {}

  # Per-domain VCL routing (multi-tenant). When set, supersedes the server.vclConfig* fields.
  # An auto-generated routing VCL and cmdfile are created from these settings.
  # server.cmdfileConfig and server.cmdfileConfigFile must not be set when routes is non-empty.
  # Availability: v1.X.0
  vcls:
    # routes: ordered list of per-domain VCL configurations.
    # Each entry must set vclContent.
    # Entries without hostnames act as a catch-all (last one wins).
    # Type: object list
    # Example:
    #   routes:
    #     - name: foo-site            # optional; defaults to first hostname or "any"
    #       hostnames:                # the hostnames to match for this VCL. If empty, this VCL will be used as a catch-all.
    #         - foo.com
    #         - www.foo.com
    #       vclContent: |
    #         vcl 4.1;
    #         backend default none;
    #         sub vcl_recv { return (synth(200)); }
    #     - vclContent: |             # no hostnames = catch-all
    #         vcl 4.1;
    #         backend default none;
    #         sub vcl_recv { return (synth(404)); }
    routes: []

    # includes: shared VCL files placed in /etc/varnish/vcls/includes/, referenced by route VCLs.
    # Map of filename to VCL content (template string).
    # Type: object
    # Example:
    #   includes:
    #     helpers.vcl: |
    #       sub common_recv { ... }
    includes: {}

  # A path to the [CLI command file](https://varnish-cache.org/docs/trunk/reference/varnishd.html#cli-command-file).
  # This configuration affects the location where `server.cmdfileConfig` will be saved to, as well as the
  # `-I` argument in the Varnish Enterprise container when `server.cmdfileConfig` is not empty.
  # Availability: v1.2.0
  cmdfileConfigPath: "/etc/varnish/cmds.cli"

  # A [CLI command file](https://varnish-cache.org/docs/trunk/reference/varnishd.html#cli-command-file) for running management commands when `varnishd` is launched.
  # For example, when loading extra VCL in multi-tenancy mode. See also
  # [External VCL ConfigMap](https://docs.varnish-software.com/varnish-helm/guides/using-external-vcl-configmap/#configmap-for-multiple-vcl-files).
  # Availability: v1.2.0
  # Type: template string
  cmdfileConfig: ""

  # Use the content of the given file path as a cmdfile. The file will be
  # parsed as templated string. Will override "server.cmdfileConfig" if set.
  # Note that the file must be placed inside the files/ directory in the Helm
  # chart itself.
  # Example:
  #   cmdfileConfigFile: "files/cmds.cli"
  cmdfileConfigFile: ""

  # Sets a base URL for Varnish Controller and Varnish Controller Router when performing a
  # HTTP-based routing. If unset, the URL will infer from a Pod IP and `server.http.port`.
  # Availability: v1.4.0
  baseUrl: ""

  # Sets the termination grace period seconds to wait for Varnish Enterprise to shut down. Once this
  # number of seconds is reached without Varnish Enterprise Pod shutting down, Kubernetes will send
  # SIGKILL to the Pod. When `server.delayedShutdown` is used, this value should be set to a higher value
  # than the maximum time (in seconds) it took for Varnish Enterprise to fully shutdown after a delayed
  # shutdown.
  #
  # The value to set here depends on the cluster setup. For example, an AWS Load Balancer may still
  # forward requests to Varnish for `deregistration_delay.timeout_seconds` which is set to 300 seconds by
  # default. If `server.delayedShutdown` took 30 seconds, then `server.terminationGracePeriodSeconds`
  # should be set to at least 330 seconds in order to have a zero-downtime during a rolling update or
  # scaling down.
  # Availability: v1.6.0
  terminationGracePeriodSeconds: 0

  # Delays stopping of the Varnish Enterprise container by the given seconds.
  # Deprecated: use `server.delayedShutdown` instead
  #delayedHaltSeconds: 0

  # Configures delayed shutdown for zero-downtime downscaling.
  delayedShutdown:
    # Sets the method for delaying shutdown of Varnish Enterprise. Can be one of `none`, `sleep`, `mempool`, or `shutdown_delay` (Varnish Enterprise 6.0.13r2 and newer).
    #
    # This is useful for rolling updates or when scaling down, where the load balancer component may still attempt to forward requests to Varnish Enterprise instance when Varnish Enterprise has already received a SIGHUP, leading to HTTP 502 errors.
    #
    # Multiple delayed shutdown methods are available:
    #
    # - `sleep` will simply sleep in the preStop for `server.delayedShutdown.sleep.seconds` seconds. This is the simplest way to delay the shutdown of Varnish Enterprise when the time taken for the load balancer component to stop forwarding traffic to Varnish Enterprise is largely static.
    # - `mempool` polls varnishstat for `MEMPOOL.sess` to go down to zero. This allows for the quickest shutdown but requires tuning `server.delayedShutdown.mempool.pollSeconds` to the traffic patterns, as `MEMPOOL.sess` may become 0 momentary resulting in an early shutdown.
    # - `shutdown_delay` similar to `sleep`, but utilizes Varnish Enterprise's `shutdown_delay` feature (available since 6.0.13r2) to perform the wait in-engine instead of relying on preStop and an external command.
    #
    # When `server.delayedShutdown.method` is set to a value other than "none", `server.terminationGracePeriodSeconds` must also be set.
    # Availability: v1.6.0
    method: "none"

    # Configures "sleep" delayed shutdown method.
    sleep:
      # Sets the number of seconds to sleep in preStop.
      seconds: 90

    # Configures "mempool" delayed shutdown method.
    mempool:
      # Poll the mempool session every given pollSeconds.
      pollSeconds: 1

      # Wait for the given waitSeconds before fully shutting down.
      waitSeconds: 5

    # Configures "shutdown_delay" delayed shutdown method.
    shutdownDelay:
      # Sets the number of seconds to delay shutdown in-engine.
      seconds: 90

  # Sets the image and tag to use to deploy Varnish Enterprise.
  # If tag is blank, appVersion is used.
  image:
    # Sets the repository for Varnish Enterprise image.
    repository: "quay.io/varnish-software/varnish-plus"
    # Sets the [imagePullPolicy](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) for the Varnish Enterprise image.
    # This can be one of Always, Never, or IfNotPreset.
    pullPolicy: IfNotPresent
    # Sets the tag for the Varnish Enterprise image. By default, this is set to the same application
    # version as in the Varnish Enterprise Helm Chart. If the tag is set to non-exact versions
    # (such as "latest", or "6.0"), make sure to set `server.image.pullPolicy` to "Always" to make
    # sure the image is always updated.
    tag: ""

  # Enables or disables autoscaling.
  autoscaling:
    # Enables the [HorizontalPodAutoscaling](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/) with the Varnish Enterprise Pod. `server.replicas`
    # is ignored if autoscaling is enabled.
    # Type: boolean
    enabled: false

    # Sets the minimum number of replicas to always keep running.
    #
    # From v1.6.0, when set to `-`, the value will inherit to that of `server.replicas`.
    # Type: string or number
    minReplicas: "-"

    # Sets the maximum number of replicas to run at most.
    maxReplicas: 100

    # Configures the `behavior` attribute of [HorizontalPodAutoscaling](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/) of the Varnish Enterprise Pod.
    # Availability: v1.6.0
    # Type: object or template string
    # Example:
    #     behavior:
    #       scaleDown:
    #         stabilizationWindowSeconds: 120
    #         policies:
    #           - type: Percent
    #             value: 50
    #             periodSeconds: 60
    #       scaleUp:
    #         policies:
    #           - type: Percent
    #             value: 100
    #             periodSeconds: 60
    #           - type: Pods
    #             value: 4
    #        periodSeconds: 60
    #    selectPolicy: Max
    behavior: ""

    # Configures the autoscaling metrics. Can be set as a templated string
    # or a YAML map.
    # Type: array or template string
    # Example:
    #     metrics: |
    #       - type: Resource
    #         resource:
    #           name: cpu
    #           targetAverageUtilization: 80
    metrics: ""

  # Enables or disables PodDisruptionBudget.
  # See also https://kubernetes.io/docs/tasks/run-application/configure-pdb/
  pdb:
    # Enables PodDisruptionBudget.
    # Availability: v1.2.0
    # Type: boolean
    enabled: false

    # Sets the number or percentage of pods that must be available after the eviction.
    # Availability: v1.2.0
    # Type: string or number
    minAvailable: ""

    # Sets the number or percentage of pods that can be unavailable after the eviction.
    # Availability: v1.2.0
    # Type: string or number
    maxUnavailable: ""

  service:
    # Enables the [Service](https://kubernetes.io/docs/concepts/services-networking/service/) for Varnish Enterprise.
    # Type: boolean
    enabled: true

    # Applies extra labels to the Service. The value can be set as either an object or a template string.
    # Type: object or template string
    labels: {}

    # Applies extra annotations to the Service. The value can be set as either an object or a template string.
    # Type: object or template string
    annotations: {}

    # Sets the type of the Service. Can be either `ClusterIP`, `LoadBalancer`, or `NodePort`.
    #
    # See also [Accessing Varnish Enterprise in Kubernetes Cluster](https://docs.varnish-software.com/varnish-helm/guides/accessing-varnish-enterprise/)
    type: NodePort

    # Sets a custom [Service ClusterIP](https://kubernetes.io/docs/concepts/services-networking/service/#type-clusterip). This value can be set as either an IP address,
    # or a literal string "None". Only applicable when `server.service.type` is set to ClusterIP. When set to
    # "None", Kubernetes will create a Headless Service, skipping the Kubernetes proxying mechanism.
    # In such case, `server.service.http.port` and `server.service.https.port` will be ignored.
    # Instead, `server.http.port` and `server.tls.port` must be used instead.
    #
    # See also [Accessing Varnish Enterprise in Kubernetes Cluster](https://docs.varnish-software.com/varnish-helm/guides/accessing-varnish-enterprise/).
    clusterIP: ""

    # Sets a pre-allocated IP address for use in LoadBalancer.
    # Availability: v1.4.0
    loadBalancerIP: ""

    # Enables or disables the Varnish HTTP service.
    http:
      # Enables HTTP service.
      # Type: boolean
      enabled: true

      # Sets the port to expose HTTP service.
      port: 80

      # Sets the port to expose HTTP service directly on the node itself. Only applicable when `server.service.type`
      # is set to NodePort. This value must be within the Kubernetes service-node-port-range (default: 30000-32767).
      #
      # See also [Accessing Varnish Enterprise in Kubernetes Cluster](https://docs.varnish-software.com/varnish-helm/guides/accessing-varnish-enterprise/).
      #nodePort: 30080

    # Enables or disables the Varnish HTTPS service.
    https:
      # Enables HTTPS service. Requires `server.tls.enabled` to be enabled.
      # Type: boolean
      enabled: false

      # Sets the port to expose HTTPS service.
      port: 443

      # Sets the port to expose HTTPS service directly on the node itself. Only applicable when `server.service.type`
      # is set to NodePort. This value must be within the Kubernetes service-node-port-range (default: 30000-32767).
      #
      # See also [accessing Varnish via NodePort](https://docs.varnish-software.com/varnish-helm/guides/accessing-varnish-enterprise/#nodeport).
      #nodePort: 30443

    # Type: array of objects
    # Enables custom-defined extra services.
    #
    #     name        Name of the service. Required.
    #
    #     targetPort  The port in a pod to forward requests to. Must also be defined in
    #                 server.extraListens. Required.
    #
    #     port        The service port to listens. Note that this port is not used in case
    #                 of headless service. targetPort will be used instead in such case.
    #                 Required for non-headless services.
    #
    #     nodePort    Expose the service directly at Node IP address at a specific port.
    #                 Only applicable when service type is set to "NodePort".
    #
    # Example:
    #     extraServices:
    #       - name: proxy
    #         targetPort: 8088
    #         port: 8088
    #         nodePort: 30888
    extraServices: []

    # Sets the externalTrafficPolicy for the Services. Can be either `Cluster` or `Local`.
    externalTrafficPolicy: Cluster

  ingress:
    # Enables the [Ingress](https://kubernetes.io/docs/concepts/services-networking/ingress/) for Varnish Enterprise.
    # Type: boolean
    enabled: false

    # Applies extra labels to the Ingress. The value can be set as either an object or a template string.
    # Type: object or template string
    labels: {}

    # Applies extra annotations to the Ingress. The value can be set as either an object or a template string.
    # Type: object or template string
    annotations: {}

    # Sets the [Ingress Class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class) for selecting Ingress controller to use.
    ingressClassName: ""

    # Sets the [Ingress Path Type](https://kubernetes.io/docs/concepts/services-networking/ingress/#path-types) for the Varnish Enterprise endpoint. The value can be
    # either `Prefix`, `Exact`, or `ImplementationSpecific`. The value to use here depends on the Ingress
    # controller.
    pathType: Prefix

    # Sets the hostname for the Ingress. This hostname is used for routing traffic.
    # Type: array of objects
    # Example:
    #   hosts:
    #     - host: chart-example.local
    #       paths: []
    hosts: []

    # An array of objects that conforms to [Ingress TLS](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls).
    # Type: array of objects
    # Example:
    #   tls:
    #     - secretName: chart-example-tls
    #       hosts:
    #         - chart-example.local
    tls: []

  # Applies extra annotations to the Pod. The value can be set as either an object or a template string.
  # Pod annotations can be used to for applying additional metadata or for integrating with external tooling.
  #  Annotations specified here will be applied to the Pod. To apply labels on a workload, use
  # `server.annotations`.
  # Type: object or template string
  # Example:
  #     podAnnotations:
  #       prometheus.io/scrape: "true"
  #       prometheus.io/path: "/metrics"
  #       prometheus.io/port: "9273"
  #       prometheus.io/scheme: "http"
  podAnnotations: {}

  # Applies extra labels to the Pod. The value can be set as either an object or a template string.
  # Labels specified here will be applied to the Pod itself. To apply labels on a workload, use
  # `server.labels`.
  # Type: object or template string
  # Example:
  #   podLabels:
  #     varnish-software.com/tier: "edge"
  podLabels: {}

  # An object that conforms to the Kubernetes [securityContext](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) definition
  # of a Container
  #
  # This securityContext will be set on the Varnish Enterprise container. For setting securityContext
  # on the Pod itself, see `global.podSecurityContext`. For setting securityContext to all containers,
  # see `global.securityContext`.
  securityContext: {}

  # An object that conforms to the Kubernetes [startupProbe](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) definition
  # of a Container
  # Availability: v1.1.0

  #Example:
  #  startupProbe:
  #    initialDelaySeconds: 5
  #    periodSeconds: 10
  #    timeoutSeconds: 1
  #    successThreshold: 1
  #    failureThreshold: 3
  #    httpGet:
  #      path: /health
  #      httpHeaders:
  #        - name: Host
  #          value: example.com
  startupProbe: {}

  # An object that conforms to the Kubernetes [readinessProbe](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) definition
  # of a Container.
  # See also [server.startupProbe.httpGet](https://docs.varnish-software.com/varnish-helm/varnish-enterprise/configurations/#serverstartupprobehttpget).
  # # Availability: v1.2.0
  # Example:
  #   readinessProbe
  #     httpGet:
  #       path: /health
  #       httpHeaders:
  #         - name: Host
  #           value: example.com
  readinessProbe:
    # Sets the initial delays in seconds until the first probe is performed.
    initialDelaySeconds: 5

    # Sets the interval in seconds between each probes.
    periodSeconds: 10

    # Sets the timeout in seconds probe is considered timed out.
    timeoutSeconds: 1

    # Sets the consecutive successes until a probe is considered a success.
    successThreshold: 1

    # Sets the consecutive failures until a probe is considered a failure.
    failureThreshold: 3

  # An object that conforms to the Kubernetes [readinessProbe](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) definition
  # of a Container.
  # See also [server.startupProbe.httpGet](https://docs.varnish-software.com/varnish-helm/varnish-enterprise/configurations/#serverstartupprobehttpget).
  # Example:
  #   livenessProbe
  #     httpGet:
  #       path: /health
  #       httpHeaders:
  #         - name: Host
  #           value: example.com
  livenessProbe:
    # Sets the initial delays in seconds until the first probe is performed.
    initialDelaySeconds: 30

    # Sets the interval in seconds between each probes.
    periodSeconds: 10

    # Sets the timeout in seconds probe is considered timed out.
    timeoutSeconds: 5

    # Sets the consecutive successes until a probe is considered a success.
    successThreshold: 1

    # Sets the consecutive failures until a probe is considered a failure.
    failureThreshold: 3

  # An object that conforms to the Kubernetes [resources](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers)
  # definition of a Container. This configuration can be used to limit resources consumed
  # by the Varnish Enterprise container.
  # Example:
  #   resources:
  #     limits:
  #       cpu: 100m
  #       memory: 128Mi
  #     requests:
  #       cpu: 100m
  #       memory: 128Mi
  resources: {}

  # An object that conforms to the Kubernetes [nodeSelector](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#PodSpec) definition of a Pod.
  # This configuration is used to select a node to schedule a Pod to. The value can be
  # set as either an object or a template string.
  # Type: object or template string
  # Example:
  #   nodeSelector:
  #     beta.kubernetes.io/arch: amd64
  nodeSelector: {}

  # An object that conforms to the Kubernetes [tolerations](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#PodSpec) definition of a Pod.
  # This configuration is used to allow the Pod to be scheduled to nodes with specific taints.
  # The value can be set as either an array of strings or a template string.
  # Type: array or template string
  tolerations: []

  # This configuration is used to fine-grain control the scheduling of the Pod. By default,
  # this is set to ensure all Varnish Enterprise Pods are always run in a different node.
  # To disable this behavior, set to empty string (""). The value can be set as either
  # an object or a template string.
  # Type: object or template string
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "varnish-enterprise.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
          topologyKey: kubernetes.io/hostname

  # Configures the Varnish NCSA sidecar.
  varnishncsa:
    # Enables HTTP request logging via [varnishncsa](https://varnish-cache.org/docs/6.0/reference/varnishncsa.html).
    # Type: boolean
    enabled: true

    # Sets the image and tag to use to deploy Varnish NCSA sidecar. Setting this to "-"
    # will inherit the same image as with server.image.
    image:
      # Sets the repository for Varnish Enterprise image for use with varnishncsa. The Varnish image used
      # here must be the same version as the Varnish Enterprise server. Set this to "-" to inherit the value
      # of `server.image.repository`.
      repository: "-"
      # Sets the [imagePullPolicy](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) for the Varnish Enterprise image for use with
      # varnishncsa. This can be one of Always, Never, or IfNotPreset. Set this to "-" to inherit the value
      # of `server.image.pullPolicy`.
      pullPolicy: "-"
      # Sets the tag for the Varnish Enterprise image for use with varnishncsa. The Varnish image used
      # here must be the same version as the Varnish Enterprise server. Set this to "-" to inherit the value
      # of `server.image.tag`.
      tag: "-"

    # An object that conforms to the Kubernetes [securityContext](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers) definition
    # of a Container.
    #
    # This securityContext will be set on the varnishncsa container. For setting securityContext
    # on the Pod itself, see `global.podSecurityContext`. For setting securityContext to all containers,
    # see `global.securityContext`.
    securityContext: {}

    # Sets the extra arguments to Varnish NCSA.
    # Type: array of strings
    extraArgs:
      - -c

    # Configures a probe for checking if a Pod is ready to receive a connection.
    readinessProbe:
      # Sets the initial delays in seconds until the first probe is performed.
      initialDelaySeconds: 5

      # Sets the interval in seconds between each probes.
      periodSeconds: 10

      # Sets the timeout in seconds probe is considered timed out.
      timeoutSeconds: 1

      # Sets the consecutive successes until a probe is considered a success.
      successThreshold: 1

      # Sets the consecutive failures until a probe is considered a failure.
      failureThreshold: 3

    # Configures a probe for checking if a Pod can continue to receive a connection.
    livenessProbe:
      initialDelaySeconds: 30

      # Sets the interval in seconds between each probes.
      periodSeconds: 10

      # Sets the timeout in seconds probe is considered timed out.
      timeoutSeconds: 5

      # Sets the consecutive successes until a probe is considered a success.
      successThreshold: 1

      # Sets the consecutive failures until a probe is considered a failure.
      failureThreshold: 3

    # An object that conforms to the Kubernetes [resources](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/#containers)
    # definition of a Container. This configuration can be used to limit resources consumed
    # by the varnishncsa container.
    # Example:
    #     resources:
    #       limits:
    #         cpu: 100m
    #         memory: 128Mi
    #       requests:
    #         cpu: 100m
    #         memory: 128Mi
    resources: {}

  # Configures the Varnish Otel sidecar.
  otel:
    # Enables the Varnish OTEL container for OpenTelemetry integration. When
    # enabled, the container runs `/usr/bin/varnish-otel` to export logs and
    # metrics from Varnish to an OTLP (OpenTelemetry Protocol) endpoint.
    # Availability: v1.7.0
    # Type: boolean
    enabled: false

    # Sets the image and tag to use to deploy Varnish OTEL sidecar. Setting this to "-"
    # will inherit the same image as with server.image.
    image:
      # Sets the repository for Varnish Enterprise image for use with Varnish
      # OTEL. The Varnish image used here must be the same version as the Varnish
      # Enterprise server. Set this to "-" to inherit the value of
      # `server.image.repository`.
      # Availability: v1.7.0
      repository: "-"
      # Sets the [imagePullPolicy][k8s-pod-v1-containers] for the Varnish
      # Enterprise image for use with Varnish OTEL. This can be one of Always,
      # Never, or IfNotPreset. Set this to "-" to inherit the value of
      # `server.image.pullPolicy`.
      # Availability: v1.7.0
      pullPolicy: "-"
      # Sets the tag for the Varnish Enterprise image for use with Varnish OTEL.
      # The Varnish image used here must be the same version as the Varnish
      # Enterprise server. Set this to "-" to inherit the value of
      # `server.image.tag`.
      # Availability: v1.7.0
      tag: "-"

    # An object that conforms to the Kubernetes
    # [securityContext][k8s-pod-v1-containers] definition of a Container.
    #
    # This securityContext will be set on the Varnish OTEL container. For
    # setting securityContext on the Pod itself, see `global.podSecurityContext`.
    # For setting securityContext to all containers, see `global.securityContext`.
    # Availability: v1.7.0
    securityContext: {}

    # An object that conforms to the Kubernetes [resources][k8s-pod-v1-containers]
    # definition of a Container. This configuration can be used to limit resources
    # consumed by the Varnish OTEL container.
    # Availability: v1.7.0
    resources: {}

    # Sets environment variables for the Varnish OTEL container. This is
    # typically used to configure OpenTelemetry exporters and other OTEL
    # settings. Most variables have sensible defaults; see the
    # [Varnish OTEL Configuration][varnish-otel] documentation.
    #
    # Can be set as an object, an array of objects, or a template string.
    #
    # For a complete list of OpenTelemetry environment variables, see the
    # [OpenTelemetry Environment Variable Specification][otel-env-vars].
    # Availability: v1.7.0
    # Example:
    #     env:
    #       OTEL_LOGS_EXPORTER: "otlp"
    #       OTEL_LOGS_EXPORTER: "otlp"
    env:

  # Configures the init container for Varnish Controller Agent.
  initAgent:
    # Configures whether to use init container to initialize Varnish Controller Agent state directory symbolic link. This is to allow Varnish Enterprise Pod to have a static path for accessing Varnish Controller Agent state files. When `server.initAgent.enabled` is `false`, the Varnish Controller Agent state directory will be discovered using a dynamic environment variable based on Pod name.
    #
    # Before v1.6.0, the state directory symbolic link is created at `/etc/varnish/agent`.
    #
    # From v1.6.0, the state directory symbolic link is created at `/etc/varnish/shared/agent`.
    #
    # From v1.8.0, the default will be changed to `false`.
    # Availability: v1.6.0
    # Type: boolean
    enabled: true

    # An object that conforms to the Kubernetes [securityContext][k8s-pod-v1-containers] definition
    # of a Container
    #
    # This securityContext will be set on the Varnish Controller Agent's init container.
    # For setting securityContext on the Pod itself, see `global.podSecurityContext`.
    # For setting securityContext to all containers, see `global.securityContext`.
    # Availability: v1.5.0
    securityContext: {}

    # Declares the extra volumes to mount with Varnish Controller Agent init container.
    # Can be set as either a YAML list or a templated string.
    # Type: array or template string
    extraVolumeMounts: []
    #extraVolumeMounts: |
    #  - name: {{ .Release.Name }}-extra
    #    mountPath: /etc/varnish/extra

    # Configures a resource limits for Varnish Controller Agent init container.
    # Example:
    #   resources:
    #     limits:
    #       cpu: 100m
    #       memory: 128Mi
    #     requests:
    #       cpu: 100m
    #       memory: 128Mi
    resources: {}

  # Configures Varnish Controller Agent sidecar for integration with Varnish Controller.
  agent:
    # Enables the [Varnish Controller Agent][varnish-controller-agent] for integration
    # with [Varnish Controller][varnish-controller].
    #
    # If Varnish Controller is deployed in a different namespace than Varnish Enterprise,
    # also set `global.natsServer.internal.namespace`.
    #
    # If Varnish Controller is deployed outside the Kubernetes cluster, or is using an
    # external NATS server not provided by Varnish Controller Helm Chart, set
    # `global.natsServer.internal.enabled` to `false` and configures
    # `global.natsServer.externalAddress`.
    # Type: boolean
    enabled: false

    # Sets the image and tag to use to deploy Varnish Controller Agent sidecar. The image
    # should be the same version as varnish-controller.
    image:
      # Sets the repository for Varnish Controller Agent image. The Varnish Controller
      # image used here must be the same version as the Varnish Controller. Since this is
      # a different image from Varnish Enterprise, using "-" is unsupported.
      repository: "quay.io/varnish-software/varnish-controller-agent"
      # Sets the [imagePullPolicy][k8s-pod-v1-containers] for the Varnish Controller image.
      # This can be one of Always, Never, or IfNotPreset.
      pullPolicy: IfNotPresent
      # Sets the tag for the Varnish Controller image for use with varnishncsa. The Varnish
      # Controller image used here must be the same version as the Varnish Controller.
      # Since this is a different image from Varnish Enterprise, using "-" is unsupported.
      tag: "7.4.1-6.0.16r13"

    # An object that conforms to the Kubernetes [securityContext][k8s-pod-v1-containers] definition
    # of a Container.
    #
    # This securityContext will be set on the Varnish Controller container. For setting
    # securityContext on the Pod itself, see `global.podSecurityContext`. For setting
    # securityContext to all containers, see `global.securityContext`.
    securityContext: {}

    # Sets the log level for the Varnish Controller Agent. The value can be one of
    # `debug`, `info`, `warning`, `error`, or `quiet`.
    logLevel: "debug"

    # Sets a [Varnish Controller private token][varnish-controller-private-token].
    # Availability: v1.5.0
    privateToken: ""

    # Sets the secret for using a varnish-enterprise.lic file.
    # See https://docs.varnish-software.com/varnish-helm/varnish-enterprise/installation/
    licenseSecret:

    # Sets the extra environment variables for Varnish Controller Agent.
    # Can be set as either an object, a list, or a templated string.
    # Type: object or array or template string
    # Example:
    #   extraEnvs:
    #     MY_ENV_VAR: value
    #     MY_OTHER_ENV_VAR: other_value
    # Example:
    #   extraEnvs:
    #     - name: MY_ENV_VAR
    #       value: value
    #     - name: MY_OTHER_ENV_VAR
    #       valueFrom:
    #         configMapRef:
    #           name: my-config-map
    #           value: my-key
    # Example:
    #   extraEnvs: |
    #     - name: RELEASE_NAMESPACE
    #       value: {{ .Release.Namespace }}
    extraEnvs: {}

    # Type: array of strings
    # Sets the extra configuration args for Varnish Controller Agent.
    extraArgs: []

    # Sets the [tags][varnish-controller-tags] for the Varnish Controller Agent.
    # Type: array of strings
    # Example:
    #     tags:
    #       - tag1
    #       - tag2
    tags: []

    # Sets the location for this Varnish Controller Agent instance for
    # use within Varnish Controller Router.
    #
    # The location object can contain `latitude` and `longitude` keys to specify
    # the geographic location of the server.
    # Example:
    #   location:
    #     longitude: "-121.955238"
    #     latitude: "37.354107"
    location: {}

    # An object that conforms to the Kubernetes [resources][k8s-pod-v1-containers]
    # definition of a Container. This configuration can be used to limit resources consumed
    # by the Varnish Controller Agent container.
    # Example:
    #     resources:
    #      limits:
    #         cpu: 100m
    #         memory: 128Mi
    #       requests:
    #         cpu: 100m
    #        memory: 128Mi
    resources: {}

    # Declares the extra volumes to mount with Varnish Controller Agent container.
    # Can be set as either a YAML list or a templated string.
    # Type: array or template string
    # Example:
    #   extraVolumeMounts: |
    #     - name: {{ .Release.Name }}-extra
    #       mountPath: /etc/varnish/extra
    extraVolumeMounts: []

    # When `server.replicas` is set to 1, use Helm Chart release name as Varnish Enterprise server name.
    # Availability: v1.4.0
    # Type: boolean
    useReleaseName: false

    # Configures persistence for Varnish Controller Agent state using PersistentVolumes.
    # This configuration is only available when `server.kind` is set to StatefulSet. See the
    # [Integration with Varnish Controller Agent](https://docs.varnish-software.com/varnish-helm/guides/setting-up-varnish-controller-agent/)
    # documentation for more information.
    persistence:
      # Enables Varnish Controller Agent state persistency using PersistentVolumes.
      # Type: boolean
      enabled: false

      # Enables Varnish Controller Agent state persistency using a custom volume mounts. This configuration
      # overrides `server.agent.persistence.enabled`.
      enableWithVolumeName: ""

      # Sets the extra labels for Persistence Volume Claim for Varnish Controller Agent.
      # Can be set as a templated string.
      # Type: object or template string
      labels: {}

      # Sets the extra annotations for Persistence Volume Claim for Varnish Controller Agent.
      # Can be set as a templated string.
      # Type: object or template string
      annotations: {}

      # Sets the storage access modes for Persistence Volume Claim for Varnish Controller Agent.
      # Type: array of strings
      accessModes: ["ReadWriteOnce"]

      # Sets the storage class for Persistence Volume Claim for Varnish Controller Agent.
      storageClassName: ""

      # Sets the storage size for Persistence Volume Claim for Varnish Controller Agent.
      storageSize: "512Mi"

    # Enables auto-removal of Varnish Enterprise instance with Varnish Controller upon
    # pod rollout (e.g. during a redeployment).
    autoRemove:
      # Enable automatic de-registering of Varnish Controller Agent during Pod rollout. The value can be
      # one of `none` (disabled), or `vcli` (use VCLI to perform de-registration).
      # Availability: v1.6.0
      method: none

      # Configures "vcli" auto-removal method.
      vcli:
        # Sets the image and tag to use to deploy Varnish Controller VCLI sidecar. The image
        # should be the same version as varnish-controller.
        image:
          repository: "quay.io/varnish-software/varnish-controller-cli"
          pullPolicy: IfNotPresent
          tag: "7.3.3"

        # Configures Varnish Controller Agent to use external Varnish Controller endpoint.
        # Ignored if `server.vcli.internal.enabled` is set to `true`.
        externalAddress: ""

        # Configures the username to connect to Varnish Controller API.
        username: admin

        # Configures NATS password as a string.
        password: ""

        # Configures NATS password from a Kubernetes secret. By default, it uses an
        # auto-generated password from a "varnish-controller-credentials" secret.
        passwordFrom:
          name: varnish-controller-credentials
          key: varnish-admin-password

        # Configures Varnish Controller CLI container to skip verifying the certificate when
        # communicating via HTTPS. This should be set to true if Varnish Controller is running
        # with a self-signed certificates.
        # Type: boolean
        insecure: false

        # Configures internal settings for Varnish Controller CLI container.
        internal:
          # Configures Varnish Controller CLI container to use an internal Varnish Controller endpoint.
          # Type: boolean
          enabled: true

          # Configures the namespace Varnish Controller is deployed to. If left blank, the
          # current namespace is used.
          namespace: ""

          # Configures the release name Varnish Controller is deployed to. Use "varnish-controller"
          # if left blank.
          releaseName: ""

          # Configures the port of the Varnish Controller APIGW.
          port: 8080

          # Configures Varnish Controller CLI container to use HTTPS instead of HTTP to communicate
          # with the in-cluster Varnish Controller instance.
          # Type: boolean
          https: false

          # Configures the NATS internal cluster domain name. Only change if NATS is deployed
          # on a separate cluster.
          clusterDomain: "cluster.local"

        # Sets the extra environment variables for Varnish Controller VCLI.
        # Type: object or array or template string
        # Sets the extra environment variables for Varnish Controller VCLI.
        # Type: object or array or template string
        # Example:
        #  extraEnvs:
        #    MY_ENV_VAR: value
        #    MY_OTHER_ENV_VAR: other_value
        # Example:
        #  extraEnvs:
        #    - name: MY_ENV_VAR
        #      value: value
        #    - name: MY_OTHER_ENV_VAR
        #      valueFrom:
        #        configMapRef:
        #          name: my-config-map
        #          value: my-key
        # Example:
        #  extraEnvs: |
        #    - name: MY_ENV_VAR
        #      value: value
        extraEnvs: {}

        # Declares the extra volumes to mount with Varnish Controller VCLI. Can be set as either
        # a YAML list or a templated string.
        # Type: array or template string
        # Example:
        #   extraVolumeMounts: |
        #     - name: {{ .Release.Name }}-local-mse
        #       mountPath: /var/lib/mse
        extraVolumeMounts: []


# Type: array of objects
# A list of extra manifests to be deployed alongside with Helm chart.
#
#     name        The name of each manifest (will be used when checksum is true)
#
#     checksum    A boolean flag whether to include this manifest as part of the
#                 checksum in workload manifests. Useful for ConfigMaps.
#
#     data        The data of each manifest. Can be set as templated string.
#
# An array of objects to attach Kubernetes manifests to a workload.
# Availability: v1.2.1
# Type: array of objects
# Example:
# extraManifests
#  - name: clusterrole
#    data: |
#      apiVersion: rbac.authorization.k8s.io/v1
#      kind: ClusterRole
#      metadata:
#        name: {{ .Release.Name }}-clusterrole
#      # ...
extraManifests: []

cluster:
  # Enables clustering and allows pods to shard requests between each others by:
  # - creating a headless service, even if `server.service.clusterIP != None`
  # - creating a secret token for pod to authorize peer-to-peer communication
  # - injecting a VCL preamble to your configuration
  # Availability: 1.6.5
  # Type: boolean
  enabled: false

  # Configures the headless service used by pods to discover each others. If empty, the name defaults to `$VARNISH_SERVICE-peers` and the service is automatically created.
  # Availability: 1.6.5
  headlessServiceName: ""

  # Configures the [token](https://docs.varnish-software.com/varnish-enterprise/features/cluster/#token)
  # used by nodes to authorize peer-to-peer communication.
  # If empty, a `$VARNISH_SERVICE-cluster-secret` secret is automatically created.
  # Availability: 1.6.5
  secretName: ""

  # Activates [traces](https://docs.varnish-software.com/varnish-enterprise/features/cluster#traces).
  # Availability: 1.6.5
  # Type: boolean
  trace: false
